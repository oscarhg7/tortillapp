<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login · TortillApp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f172a;
  color:white;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  border:none;
  border-radius:20px;
  padding:30px;
  width:100%;
  max-width:400px;
}

h2{
  color:#facc15;
  font-weight:700;
  text-align:center;
  margin-bottom:25px;
}

input{
  background:#334155 !important;
  color:white !important;
  border:none !important;
}

input::placeholder{
  color:#cbd5e1 !important;
}

.btn-warning{
  background:#facc15;
  border:none;
  color:black;
  font-weight:600;
}

.btn-warning:hover{
  background:#eab308;
}

.error{
  background:#7f1d1d;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h2>🥔 TortillApp</h2>

{% if error %}
<div class="error">
  {{ error }}
</div>
{% endif %}

<form method="POST">

<input type="text" name="username" class="form-control mb-3" placeholder="Usuario" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>

<button class="btn btn-warning w-100 mb-2">Iniciar sesión</button>

</form>

<div class="text-center mt-2">
  <a href="{{ url_for('register') }}" style="color:#facc15;">
    Crear cuenta
  </a>
</div>

</div>

</body>
</html>
