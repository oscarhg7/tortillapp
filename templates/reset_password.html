<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña · TortillApp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo-wrapper">
                    <svg class="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
                        <defs>
                            <radialGradient id="tg" cx="38%" cy="32%" r="70%">
                                <stop offset="0%"   stop-color="#fff4a0"/>
                                <stop offset="45%"  stop-color="#FFD700"/>
                                <stop offset="100%" stop-color="#b45309"/>
                            </radialGradient>
                            <radialGradient id="th" cx="42%" cy="36%" r="48%">
                                <stop offset="0%"   stop-color="rgba(255,255,255,0.45)"/>
                                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                            </radialGradient>
                            <filter id="ts" x="-15%" y="-15%" width="130%" height="140%">
                                <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.55"/>
                            </filter>
                        </defs>
                        <circle cx="24" cy="24" r="23" fill="#92400e" filter="url(#ts)"/>
                        <circle cx="24" cy="24" r="21" fill="url(#tg)"/>
                        <circle cx="24" cy="24" r="21" fill="url(#th)"/>
                        <circle cx="24" cy="24" r="14.5" fill="none" stroke="#b45309" stroke-width="1.2" opacity="0.38"/>
                        <circle cx="24" cy="24" r="7.5"  fill="none" stroke="#b45309" stroke-width="1"   opacity="0.28"/>
                        <ellipse cx="21" cy="27" rx="3.2" ry="2.2" fill="#d97706" opacity="0.45" transform="rotate(-12 21 27)"/>
                        <ellipse cx="30" cy="22" rx="2.5" ry="1.8" fill="#d97706" opacity="0.38" transform="rotate(18 30 22)"/>
                        <ellipse cx="26" cy="32" rx="2.2" ry="1.6" fill="#d97706" opacity="0.35" transform="rotate(5 26 32)"/>
                        <circle cx="24" cy="24" r="3" fill="#d97706" opacity="0.5"/>
                    </svg>
                    <h1 class="app-title">TortillApp</h1>
                </div>
                <p class="auth-subtitle">Restablecer contraseña</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control"
                        placeholder="Ingresa tu usuario"
                        required
                        minlength="3"
                        maxlength="100"
                        autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Nueva contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Nueva contraseña"
                        required
                        minlength="6"
                        maxlength="255">
                    <small class="form-help">Mínimo 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label for="password_confirm">Confirmar contraseña</label>
                    <input
                        type="password"
                        id="password_confirm"
                        name="password_confirm"
                        class="form-control"
                        placeholder="Repite la nueva contraseña"
                        required
                        minlength="6"
                        maxlength="255">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    🔑 Cambiar contraseña
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Recuerdas tu contraseña?</p>
                <a href="{{ url_for('login') }}" class="auth-link">
                    Volver al inicio de sesión →
                </a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='cookies.js') }}"></script>
</body>
</html>
