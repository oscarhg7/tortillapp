{% extends "base.html" %}

{% block title %}Error 500 - TortillApp{% endblock %}

{% block content %}
<div class="error-container">
  <div class="card" style="max-width: 500px; margin: 60px auto; text-align: center; padding: 40px;">
    <div style="font-size: 4rem; margin-bottom: 20px;">⚠️</div>
    <h1 style="color: #ef4444; margin-bottom: 15px;">Error 500</h1>
    <p style="color: #cbd5e1; font-size: 1.1rem; margin-bottom: 20px;">
      Algo salió mal en el servidor. Lo sentimos mucho.
    </p>
    <p style="color: #64748b; margin-bottom: 30px;">
      Por favor, intenta más tarde o reporta el problema.
    </p>
    <a href="{{ url_for('home') }}" style="
      display: inline-block;
      background-color: #10b981;
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    " onmouseover="this.style.backgroundColor='#059669'" onmouseout="this.style.backgroundColor='#10b981'">
      ← Volver al inicio
    </a>
  </div>
</div>
{% endblock %}
